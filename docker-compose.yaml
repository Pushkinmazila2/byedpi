services:
  byedpi:
    image: tazihad/byedpi
    container_name: byedpi
    restart: unless-stopped
    ports:
      - "1080:1080"
    # Аргументы передаются списком, чтобы избежать проблем с кавычками
    command:
      - "--split"
      - "1"             # Режем на 1-м байте (самый надежный вариант для TLS)
      - "--fake"
      - "-1"
      - "--ttl"
      - "5"             # Оставляем TTL низким
      - "--fake-sni"
      - "://google.com"
      - "--winsize"
      - "40"            # Ограничиваем размер окна (TCP Window) — это заставляет сервер слать данные мелкими порциями, которые DPI сложнее анализировать
      - "--mod-http"
      - "hcsm"
      - "--debug"
      - "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -x socks5h://127.0.0.1:1080 http://www.google.com --connect-timeout 2 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
