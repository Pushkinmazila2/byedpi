services:
  byedpi:
    image: tazihad/byedpi
    container_name: byedpi
    restart: unless-stopped
    ports:
      - "1080:1080"
    # Аргументы передаются списком, чтобы избежать проблем с кавычками
    command:
      - "--disorder"
      - "3"             # Глубокое перемешивание пакетов
      - "--split"
      - "1"             # Режем с первого же байта (самый агрессивный split)
      - "--fake"        # Отправляем фейковый пакет
      - "-1"            # Автоматический выбор размера фейка (часто эффективнее константы)
      - "--ttl"
      - "8"             # TTL для фейка, чтобы он прошел первый узел провайдера
      - "--fake-sni"
      - "google.com"    # Можно оставить или сменить на vk.com
      - "--oob"
      - "1"             # Включаем Out-of-band данные (мощное усиление)
      - "--debug"
      - "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -x socks5h://127.0.0.1:1080 http://www.google.com --connect-timeout 2 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
