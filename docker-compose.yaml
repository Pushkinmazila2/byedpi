services:
  byedpi:
    image: tazihad/byedpi
    container_name: byedpi
    restart: unless-stopped
    network:
      - s-ui
    ports:
      - "127.0.0.1:1080:1080"
    # Аргументы передаются списком, чтобы избежать проблем с кавычками
    command:
      - "--disorder"
      - "1"
      - "--split"
      - "2"
      - "--fake"
      - "6"
      - "--ttl"
      - "5"
      - "--fake-sni=www.google.com"
      - "--debug"
      - "2"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -x socks5h://127.0.0.1:1080 http://www.google.com --connect-timeout 2 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
