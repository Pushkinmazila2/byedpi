services:
  byedpi:
    image: ghcr.io/pushkinmazila2/byedpi:main
    command: ${COMMAND_STRATEGY}
    restart: unless-stopped
    user: 1000:1000
    ports:
      - name: SOCKS proxy
        target: 1080
        host_ip: 127.0.0.1
        published: 1080
        protocol: tcp
    healthcheck:
      test: ["CMD-SHELL", "curl -s -x socks5h://127.0.0.1:1080 http://www.google.com --connect-timeout 2 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

