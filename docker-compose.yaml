services:
  byedpi:
    image: tazihad/byedpi
    container_name: byedpi
    restart: unless-stopped
    ports:
      - "1080:1080"
    # Аргументы передаются списком, чтобы избежать проблем с кавычками
    command:
      - "--split"
      - "1"             # Режем на первом же байте (самое эффективное для TLS)
      - "--disorder"
      - "1"             # Возвращаем минимальный разлад
      - "--fake"
      - "-1"            # Автоматический размер фейка
      - "--ttl"
      - "4"             # Пробуем уменьшить TTL (чтобы фейк «умер» сразу после ТСПУ)
      - "--fake-sni"
      - "://google.com"
      - "--mod-http"
      - "hcsm"          # Перемешивание регистра (Host Case)
      - "--debug"
      - "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -x socks5h://127.0.0.1:1080 http://www.google.com --connect-timeout 2 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
