services:
  byedpi:
    image: tazihad/byedpi
    container_name: byedpi
    restart: unless-stopped
    ports:
      - "1080:1080"
    # Аргументы передаются списком, чтобы избежать проблем с кавычками
    command:
      - "--split"
      - "2"             # Режем на 2-м байте (стандарт де-факто)
      - "--disorder"
      - "1"             # Уменьшаем до 1, чтобы не ломать сессию
      - "--fake"
      - "-1"            # Оставляем авто-размер фейка
      - "--ttl"
      - "8"
      - "--fake-sni"
      - "vk.com"        # Пробуем домен из белого списка РФ
      - "--mod-http"
      - "hcsm"          # Добавляем манипуляцию заголовками (Host Case/Space Mixing)
      - "--debug"
      - "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -x socks5h://127.0.0.1:1080 http://www.google.com --connect-timeout 2 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
