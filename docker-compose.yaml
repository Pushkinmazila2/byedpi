services:
  byedpi:
    image: ghcr.io/pushkinmazila2/byedpi:main
    command: ["ciadpi", "-i", "0.0.0.0", "-p", "1080", "-s1", "-o1", "-m3", "-f-1", "-k0"]
    restart: unless-stopped
    user: 1000:1000
    ports:
      - name: SOCKS proxy
        target: 1080
        host_ip: 127.0.0.1
        published: 1080
        protocol: tcp
